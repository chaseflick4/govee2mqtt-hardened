name: Govee2MQTT Minimal Hardened Fork
image: ghcr.io/chaseflick4/govee2mqtt-hardened-{arch}
version: "2026.07.15-minimal1"
slug: govee2mqtt_hardened
description: Govee MQTT bridge with minimal Home Assistant runtime hardening
url: https://github.com/chaseflick4/govee2mqtt-hardened
arch:
  - amd64
  - aarch64
init: false
startup: services
services:
  - mqtt:need

apparmor: true

# Host network access is required for LAN discovery
host_network: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  govee_email: "str?"
  govee_password: "password?"
  govee_api_key: "password?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  debug_level: "str?"
  no_multicast: "bool?"
  broadcast_all: "bool?"
  global_broadcast: "bool?"
  scan: "str?"
